AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Identity Governance Solution - Immutable user lifecycle audit trails,
  sync-deletion proof, activity tracking, and access recertification.

# Parameters 

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment stage

  CognitoUserPoolId:
    Type: String
    Default: ''
    Description: Existing Cognito User Pool ID (leave blank to create new)

  IdentityStoreId:
    Type: String
    Default: ''
    Description: IAM Identity Center Identity Store ID

  SesSenderEmail:
    Type: String
    Default: noreply@example.com
    Description: Verified SES sender email address

  RecertDeadlineDays:
    Type: Number
    Default: 14
    Description: Days to complete recertification cycle

  ReconciliationGraceHours:
    Type: Number
    Default: 1
    Description: Grace period (hours) before flagging orphaned accounts

# Globals 

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 30
    Tracing: Active
    Tags:
      Project: IdentityGovernance
      Environment: !Ref Stage
    Environment:
      Variables:
        TABLE_NAME: !Ref IdentityGovernanceTable
        EVIDENCE_BUCKET: !Ref EvidenceBucket
        COGNITO_USER_POOL_ID: !Ref CognitoUserPool
        IDENTITY_STORE_ID: !Ref IdentityStoreId
        SES_SENDER_EMAIL: !Ref SesSenderEmail
        RECERT_DEADLINE_DAYS: !Ref RecertDeadlineDays
        RECONCILIATION_GRACE_HOURS: !Ref ReconciliationGraceHours
        STAGE: !Ref Stage

# Mappings 

Mappings:
  RegionDefaults:
    ap-south-1:
      SesRegion: ap-south-1
    us-east-1:
      SesRegion: us-east-1
    eu-west-1:
      SesRegion: eu-west-1

# Resources 

Resources:


  # DynamoDB Table (Task 10.2) 

  IdentityGovernanceTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub 'IdentityGovernanceTable-${Stage}'
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: alias/aws/dynamodb
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: IdentityGovernance
        - Key: Environment
          Value: !Ref Stage
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL


  # S3 Access Logs Bucket

  AccessLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'identity-governance-access-logs-${Stage}-${AWS::AccountId}'
      AccessControl: LogDeliveryWrite
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            Days: 90
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteLogsAfter90Days
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: IdentityGovernance
        - Key: Environment
          Value: !Ref Stage

  # S3 Evidence Bucket (Task 10.3) 

  EvidenceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'identity-governance-evidence-${Stage}-${AWS::AccountId}'
      AccessControl: Private
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            Days: 2920
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: evidence-bucket-logs/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: GlacierDeepArchiveAfter1Year
            Status: Enabled
            Prefix: evidence/
            Transitions:
              - StorageClass: DEEP_ARCHIVE
                TransitionInDays: 365
      Tags:
        - Key: Project
          Value: IdentityGovernance
        - Key: Environment
          Value: !Ref Stage


  # Cognito User Pool (Task 10.4) 

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'IdentityGovernance-${Stage}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UserPoolTags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'IdentityGovernance-Client-${Stage}'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref CognitoUserPool
      Description: System administrators

  CognitoAuditorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: auditor
      UserPoolId: !Ref CognitoUserPool
      Description: Compliance auditors

  CognitoManagerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: manager
      UserPoolId: !Ref CognitoUserPool
      Description: People managers for recertification

  CognitoDesignatedLeaderGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: designated_leader
      UserPoolId: !Ref CognitoUserPool
      Description: Designated leaders for escalation

  CognitoOwnerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: owner
      UserPoolId: !Ref CognitoUserPool
      Description: Resource owners for recertification reviews


  # API Gateway (Task 10.5) 

  # API Gateway Access Log Group

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/IdentityGovernance-${Stage}'
      RetentionInDays: 90
      KmsKeyId: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch'
      Tags:
        - Key: Project
          Value: IdentityGovernance
        - Key: Environment
          Value: !Ref Stage

  GovernanceApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'IdentityGovernance-API-${Stage}'
      StageName: !Ref Stage
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        ApiKeyRequired: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            AuthorizationScopes: []
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"


  # Lambda Functions (Task 10.6) 

  # 1. Audit Writer - writes lifecycle events to DynamoDB
  AuditWriterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-audit-writer-${Stage}'
      Handler: functions/audit-writer/index.handler
      CodeUri: src/
      Description: Writes immutable lifecycle audit records to DynamoDB
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - !Sub '${EvidenceBucket.Arn}/*'
      # ASSUMPTION: Cognito PostConfirmation trigger only attached when creating a new User Pool.
      # For existing pools, configure the trigger manually via AWS Console or CLI.
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # NOTE: PostConfirmation trigger is configured post-deploy via:
  # aws cognito-idp update-user-pool --user-pool-id <POOL_ID> \
  #   --lambda-config PostConfirmation=<AUDIT_WRITER_ARN>
  # This avoids circular dependency between UserPool and Lambda global env vars.

  # 2. Evidence Archiver - DynamoDB Streams to S3 archive
  EvidenceArchiverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-evidence-archiver-${Stage}'
      Handler: functions/evidence-archiver/index.handler
      CodeUri: src/
      Description: Archives audit records to S3 with Object Lock and computes evidence hashes
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:PutObjectRetention
              Resource:
                - !Sub '${EvidenceBucket.Arn}/*'
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource:
                - !Sub '${IdentityGovernanceTable.Arn}/stream/*'
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt IdentityGovernanceTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 10
            MaximumRetryAttempts: 3
            Enabled: true
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 3. Audit Query - API for auditors to query audit trail
  AuditQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-audit-query-${Stage}'
      Handler: functions/audit-query/index.handler
      CodeUri: src/
      Description: Handles auditor-facing API endpoints for timeline, search, dashboard, export
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          IDENTITY_STORE_ID: !Ref IdentityStoreId
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
                - !Sub '${IdentityGovernanceTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
                - cognito-idp:AdminGetUser
              Resource: !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action:
                - iam:ListUsers
                - iam:GetUser
                - iam:ListGroupsForUser
              Resource: '*'
            - Effect: Allow
              Action:
                - identitystore:ListUsers
                - identitystore:DescribeUser
              Resource: '*'
      Events:
        Timeline:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /audit/users/{userId}/timeline
            Method: GET
        DeletionProof:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /audit/users/{userId}/deletion-proof
            Method: GET
        Export:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /audit/export
            Method: GET
        SearchUsers:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /search/users
            Method: GET
        UserDetail:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /users/{userId}/detail
            Method: GET
        DashboardSummary:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /dashboard/summary
            Method: GET
        DashboardTimeline:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /dashboard/events/timeline
            Method: GET
        DashboardDistribution:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /dashboard/users/distribution
            Method: GET
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 4. Activity Tracker - PostAuthentication trigger + activity logger
  ActivityTrackerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-activity-tracker-${Stage}'
      Handler: functions/activity-tracker/index.handler
      CodeUri: src/
      Description: Tracks user login activity and maintains daily activity summaries
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource:
                - !GetAtt CognitoUserPool.Arn
      Events:
        ActivityQuery:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /activity/users/{userId}
            Method: GET
        DashboardActivitySummary:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /dashboard/activity/summary
            Method: GET
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 5. Stats Aggregator - daily stats computation
  StatsAggregatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-stats-aggregator-${Stage}'
      Handler: functions/stats-aggregator/index.handler
      CodeUri: src/
      Description: Computes and caches daily dashboard statistics
      Timeout: 300
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          IDENTITY_STORE_ID: !Ref IdentityStoreId
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
                - !Sub '${IdentityGovernanceTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - tag:GetResources
              Resource: '*'
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
              Resource:
                - !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action:
                - iam:ListUsers
                - iam:GetUser
              Resource: '*'
            - Effect: Allow
              Action:
                - identitystore:ListUsers
              Resource: '*'
            - Effect: Allow
              Action:
                - sts:AssumeRole
              Resource:
                - 'arn:aws:iam::*:role/VIGILCrossAccountRole'
            - Effect: Allow
              Action:
                - organizations:ListAccounts
              Resource: '*'
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 6. Sync Reconciler - compares IdP users vs local users
  SyncReconcilerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-sync-reconciler-${Stage}'
      Handler: functions/sync-reconciler/index.handler
      CodeUri: src/
      Description: Reconciles identity provider users against local audit records
      Timeout: 300
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
                - !Sub '${IdentityGovernanceTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminDisableUser
                - cognito-idp:AdminUserGlobalSignOut
                - cognito-idp:AdminDeleteUser
              Resource:
                - !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action:
                - iam:ListUsers
                - iam:GetUser
              Resource: '*'
            - Effect: Allow
              Action:
                - identitystore:ListUsers
                - identitystore:DescribeUser
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - !Sub '${EvidenceBucket.Arn}/*'
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/igs/idp/*'
      Events:
        ReconciliationLatest:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /sync/reconciliation/latest
            Method: GET
        OrphanedAccounts:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /sync/orphaned
            Method: GET
        ConfirmOrphanDelete:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /sync/orphaned/{userId}/confirm-delete
            Method: POST
        DashboardSyncSummary:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /dashboard/sync/summary
            Method: GET
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 7. Recert Initiator - kicks off quarterly recertification cycles
  RecertInitiatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-recert-initiator-${Stage}'
      Handler: functions/recert-initiator/index.handler
      CodeUri: src/
      Description: Initiates quarterly recertification cycles and manages admin assignments (v4)
      Timeout: 300
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
                - !Sub '${IdentityGovernanceTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - iam:ListUsers
                - iam:GetUser
                - iam:ListUserTags
                - iam:ListAttachedUserPolicies
                - iam:ListUserPolicies
                - iam:ListGroupsForUser
                - iam:ListAccessKeys
                - iam:SimulatePrincipalPolicy
              Resource: '*'
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
              Resource:
                - !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action:
                - identitystore:ListUsers
              Resource: '*'
            - Effect: Allow
              Action:
                - tag:GetResources
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:GetBucketPolicy
                - s3:GetBucketTagging
                - s3:GetPublicAccessBlock
                - s3:GetBucketPublicAccessBlock
                - s3:GetBucketAcl
                - s3:ListAllMyBuckets
              Resource: '*'
            - Effect: Allow
              Action:
                - cloudtrail:LookupEvents
              Resource: '*'
            - Effect: Allow
              Action:
                - sts:AssumeRole
              Resource:
                - 'arn:aws:iam::*:role/VIGILCrossAccountRole'
            - Effect: Allow
              Action:
                - organizations:ListAccounts
              Resource: '*'
      Events:
        CreateCycle:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/cycles
            Method: POST
        PostOverrides:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/overrides
            Method: POST
        GetOverrides:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/overrides
            Method: GET
        GetUnowned:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/unowned
            Method: GET
        DeleteOverride:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/overrides/{ownerEmail}/resources/{userId}
            Method: DELETE
        GetAccounts:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/accounts
            Method: GET
        SyncAccounts:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/accounts/sync
            Method: POST
        ScanAccount:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /admin/accounts/{accountId}/scan
            Method: POST
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 8. Recert Processor - processes manager certify/revoke decisions
  RecertProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-recert-processor-${Stage}'
      Handler: functions/recert-processor/index.handler
      CodeUri: src/
      Description: Processes recertification decisions and manages cycle lifecycle
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
                - !Sub '${IdentityGovernanceTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - cognito-idp:AdminDisableUser
                - cognito-idp:AdminUserGlobalSignOut
              Resource:
                - !GetAtt CognitoUserPool.Arn
            - Effect: Allow
              Action:
                - identitystore:UpdateUser
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - !Sub '${EvidenceBucket.Arn}/reports/*'
            - Effect: Allow
              Action:
                - s3:DeleteBucketPolicy
                - s3:PutPublicAccessBlock
                - s3:PutBucketAcl
                - s3:PutBucketPolicy
                - s3:GetBucketPolicy
                - s3:GetPublicAccessBlock
                - s3:GetBucketAcl
              Resource: '*'
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt RecertNotifierFunction.Arn
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:identity-governance-recert-processor-${Stage}'
            - Effect: Allow
              Action:
                - iam:UpdateAccessKey
                - iam:DeleteLoginProfile
                - iam:RemoveUserFromGroup
                - iam:DetachUserPolicy
                - iam:ListGroupsForUser
                - iam:ListAttachedUserPolicies
                - iam:ListUserPolicies
                - iam:ListAccessKeys
                - iam:ListUserTags
              Resource: '*'
            - Effect: Allow
              Action:
                - sts:AssumeRole
              Resource:
                - 'arn:aws:iam::*:role/VIGILCrossAccountRole'
      Events:
        CycleDetails:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/cycles/{cycleId}
            Method: GET
        MyReviews:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/my-reviews
            Method: GET
        SubmitDecisions:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/decisions
            Method: POST
        ExtendDeadline:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/cycles/{cycleId}/extend
            Method: POST
        TransferReviews:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/cycles/{cycleId}/transfer
            Method: POST
        DashboardRecertSummary:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /dashboard/recert/summary
            Method: GET
        UserRecertHistory:
          Type: Api
          Properties:
            RestApiId: !Ref GovernanceApi
            Path: /recert/users/{userId}/history
            Method: GET
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # 9. Recert Notifier - sends SES email notifications
  RecertNotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-recert-notifier-${Stage}'
      Handler: functions/recert-notifier/index.handler
      CodeUri: src/
      Description: Sends recertification reminder and escalation emails via SES
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:GetItem
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
                - !Sub '${IdentityGovernanceTable.Arn}/index/*'
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage


  # 10. Bulk Import Scanner - backfills missing audit records
  BulkImportScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'identity-governance-bulk-import-scanner-${Stage}'
      Handler: functions/bulk-import-scanner/index.handler
      CodeUri: src/
      Description: Scans Cognito for bulk-imported users and backfills missing audit records
      Timeout: 300
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt IdentityGovernanceTable.Arn
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
              Resource:
                - !GetAtt CognitoUserPool.Arn
      Tags:
        Project: IdentityGovernance
        Environment: !Ref Stage

  # EventBridge Rules (Task 10.7) 

  # CloudTrail event routing for Cognito lifecycle events
  CognitoCloudTrailRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'identity-governance-cognito-events-${Stage}'
      Description: Routes Cognito CloudTrail events to audit-writer Lambda
      State: ENABLED
      EventPattern:
        source:
          - aws.cognito-idp
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - AdminUpdateUserAttributes
            - AdminDeleteUser
            - AdminCreateUser
            - AdminDisableUser
            - AdminEnableUser
      Targets:
        - Arn: !GetAtt AuditWriterFunction.Arn
          Id: AuditWriterCognitoTarget

  CognitoCloudTrailRulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuditWriterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CognitoCloudTrailRule.Arn

  # CloudTrail event routing for Identity Center SCIM events
  ScimCloudTrailRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'identity-governance-scim-events-${Stage}'
      Description: Routes Identity Center SCIM CloudTrail events to audit-writer Lambda
      State: ENABLED
      EventPattern:
        source:
          - aws.sso-directory
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - CreateUser
            - UpdateUser
            - DeleteUser
      Targets:
        - Arn: !GetAtt AuditWriterFunction.Arn
          Id: AuditWriterScimTarget

  ScimCloudTrailRulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuditWriterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScimCloudTrailRule.Arn

  # EventBridge Schedulers (Task 10.8) 

  # Scheduler execution role
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'identity-governance-scheduler-role-${Stage}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt SyncReconcilerFunction.Arn
                  - !GetAtt StatsAggregatorFunction.Arn
                  - !GetAtt ActivityTrackerFunction.Arn
                  - !GetAtt RecertInitiatorFunction.Arn
                  - !GetAtt BulkImportScannerFunction.Arn

  # Reconciliation - every 6 hours
  ReconciliationSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'identity-governance-reconciliation-${Stage}'
      Description: Runs sync reconciliation every 6 hours
      ScheduleExpression: 'rate(6 hours)'
      FlexibleTimeWindow:
        Mode: FLEXIBLE
        MaximumWindowInMinutes: 15
      State: ENABLED
      Target:
        Arn: !GetAtt SyncReconcilerFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  # Daily stats aggregation - 18:30 UTC
  StatsAggregationSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'identity-governance-stats-aggregation-${Stage}'
      Description: Computes daily dashboard statistics at 18:30 UTC (midnight IST)
      ScheduleExpression: 'cron(30 18 * * ? *)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt StatsAggregatorFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  # Daily activity aggregation - 18:30 UTC
  ActivityAggregationSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'identity-governance-activity-aggregation-${Stage}'
      Description: Aggregates daily user activity at 18:30 UTC (midnight IST)
      ScheduleExpression: 'cron(30 18 * * ? *)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt ActivityTrackerFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  # Quarterly recertification - first day of Jan, Apr, Jul, Oct at 00:00 UTC
  QuarterlyRecertSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'identity-governance-quarterly-recert-${Stage}'
      Description: Initiates quarterly access recertification cycle
      ScheduleExpression: 'cron(0 0 1 1,4,7,10 ? *)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt RecertInitiatorFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  # Bulk import scanner - every 15 minutes
  BulkImportScannerSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'identity-governance-bulk-import-scanner-${Stage}'
      Description: Scans for bulk-imported Cognito users every 15 minutes
      ScheduleExpression: 'rate(15 minutes)'
      FlexibleTimeWindow:
        Mode: FLEXIBLE
        MaximumWindowInMinutes: 5
      State: ENABLED
      Target:
        Arn: !GetAtt BulkImportScannerFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  # Nightly cache sync - 00:00 UTC daily
  NightlyCacheSyncSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'identity-governance-nightly-cache-sync-${Stage}'
      Description: Nightly cache sync at 12:00 AM UTC - refreshes stats, unowned resources, and resource cache
      ScheduleExpression: 'cron(0 0 * * ? *)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt StatsAggregatorFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn


  # Immutability Enforcement (Task 10.10) 

  AuditImmutabilityPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'identity-governance-audit-immutability-${Stage}'
      Description: Denies deletion and modification of audit records in DynamoDB and evidence objects in S3
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyAuditRecordMutation
            Effect: Deny
            Action:
              - dynamodb:DeleteItem
              - dynamodb:UpdateItem
            Resource:
              - !GetAtt IdentityGovernanceTable.Arn
            Condition:
              ForAnyValue:StringLike:
                dynamodb:LeadingKeys:
                  - 'USER#*'
          - Sid: DenyEvidenceObjectDeletion
            Effect: Deny
            Action:
              - s3:DeleteObject
              - s3:DeleteObjectVersion
              - s3:PutObjectRetention
            Resource:
              - !Sub '${EvidenceBucket.Arn}/evidence/*'

  # Attach immutability policy to all function roles that should not mutate audit records
  # Note: Evidence archiver is excluded because it needs UpdateItem for evidenceHash/evidenceS3Key fields


  # CloudTrail Data Events (Recertification V2) 
  # NOTE: S3 data event selectors configured on existing GovernanceAuditTrail via CLI.
  # Account has max 5 trails - cannot create a new one.
  # Command used: aws cloudtrail put-event-selectors --trail-name GovernanceAuditTrail
  #   --advanced-event-selectors '[{"Name":"S3DataEventsForVigilBuckets","FieldSelectors":[
  #   {"Field":"eventCategory","Equals":["Data"]},{"Field":"resources.type","Equals":["AWS::S3::Object"]},
  #   {"Field":"resources.ARN","StartsWith":["arn:aws:s3:::iga-"]}]}]'

# Outputs 

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${GovernanceApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'

  TableName:
    Description: DynamoDB table name
    Value: !Ref IdentityGovernanceTable

  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt IdentityGovernanceTable.Arn

  EvidenceBucketName:
    Description: S3 evidence bucket name
    Value: !Ref EvidenceBucket

  CognitoUserPoolIdOutput:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient

  AuditWriterFunctionArn:
    Description: Audit Writer Lambda ARN
    Value: !GetAtt AuditWriterFunction.Arn

  EvidenceArchiverFunctionArn:
    Description: Evidence Archiver Lambda ARN
    Value: !GetAtt EvidenceArchiverFunction.Arn

  BulkImportScannerFunctionArn:
    Description: Bulk Import Scanner Lambda ARN
    Value: !GetAtt BulkImportScannerFunction.Arn
