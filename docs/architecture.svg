<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" font-family="'Amazon Ember',Arial,Helvetica,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6b7a"/>
    </marker>
    <style>
      .box{stroke:#16191f;stroke-width:1;rx:8;}
      .lbl{font-size:12px;font-weight:700;fill:#fff;}
      .sub{font-size:10px;fill:#fff;}
      .dark{font-size:12px;font-weight:700;fill:#16191f;}
      .darksub{font-size:10px;fill:#414d5c;}
      .edge{stroke:#5f6b7a;stroke-width:1.5;fill:none;marker-end:url(#arrow);}
      .edged{stroke:#5f6b7a;stroke-width:1.5;fill:none;stroke-dasharray:5 4;marker-end:url(#arrow);}
      .etxt{font-size:10px;fill:#5f6b7a;}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#f2f3f3"/>
  <rect x="0" y="0" width="960" height="44" fill="#232f3e"/>
  <text x="20" y="28" font-size="16" font-weight="700" fill="#fff">VIGIL — Access Recertification Engine</text>
  <text x="700" y="28" font-size="11" fill="#d5dbdb">Serverless · AWS</text>

  <!-- Client -->
  <rect class="box" x="30" y="80" width="170" height="56" rx="8" fill="#5f6b7a"/>
  <text class="lbl" x="115" y="104" text-anchor="middle">Client UI / your app</text>
  <text class="sub" x="115" y="120" text-anchor="middle">Cognito ID token (JWT)</text>

  <!-- API -->
  <rect class="box" x="280" y="80" width="170" height="56" rx="8" fill="#ED7100"/>
  <text class="lbl" x="365" y="104" text-anchor="middle">recert-api</text>
  <text class="sub" x="365" y="120" text-anchor="middle">REST · Cognito authorizer</text>

  <!-- Discovery -->
  <rect class="box" x="530" y="80" width="170" height="56" rx="8" fill="#ED7100"/>
  <text class="lbl" x="615" y="104" text-anchor="middle">recert-discovery</text>
  <text class="sub" x="615" y="120" text-anchor="middle">owner-tag scan + access</text>

  <!-- Notifier -->
  <rect class="box" x="760" y="80" width="170" height="56" rx="8" fill="#ED7100"/>
  <text class="lbl" x="845" y="104" text-anchor="middle">recert-notifier</text>
  <text class="sub" x="845" y="120" text-anchor="middle">owner emails</text>

  <!-- Tagging API -->
  <rect class="box" x="530" y="178" width="170" height="44" rx="8" fill="#879596"/>
  <text class="lbl" x="615" y="205" text-anchor="middle">Resource Groups Tagging</text>

  <!-- SES -->
  <rect class="box" x="760" y="178" width="170" height="44" rx="8" fill="#E7157B"/>
  <text class="lbl" x="845" y="205" text-anchor="middle">Amazon SES</text>

  <!-- SQS -->
  <rect class="box" x="280" y="200" width="170" height="50" rx="8" fill="#E7157B"/>
  <text class="lbl" x="365" y="222" text-anchor="middle">SQS enforcement queue</text>
  <text class="sub" x="365" y="238" text-anchor="middle">idempotent · retried</text>

  <!-- DLQ -->
  <rect class="box" x="280" y="290" width="170" height="44" rx="8" fill="#c7286f"/>
  <text class="lbl" x="365" y="312" text-anchor="middle">DLQ + CloudWatch alarm</text>

  <!-- Enforcer -->
  <rect class="box" x="530" y="270" width="170" height="60" rx="8" fill="#ED7100"/>
  <text class="lbl" x="615" y="294" text-anchor="middle">recert-enforcer</text>
  <text class="sub" x="615" y="310" text-anchor="middle">snapshot → apply → verify</text>

  <!-- Connectors -->
  <rect class="box" x="760" y="262" width="170" height="76" rx="8" fill="#16191f"/>
  <text class="lbl" x="845" y="286" text-anchor="middle">Connectors</text>
  <text class="sub" x="845" y="304" text-anchor="middle">S3 · IAM user</text>
  <text class="sub" x="845" y="318" text-anchor="middle">IAM role · (extensible)</text>

  <!-- Data stores row -->
  <rect class="box" x="280" y="430" width="220" height="64" rx="8" fill="#527FFF"/>
  <text class="lbl" x="390" y="452" text-anchor="middle">DynamoDB (single table)</text>
  <text class="sub" x="390" y="468" text-anchor="middle">cycles · review items · decisions</text>
  <text class="sub" x="390" y="482" text-anchor="middle">snapshots · hash-chained evidence</text>

  <rect class="box" x="540" y="430" width="180" height="64" rx="8" fill="#7AA116"/>
  <text class="lbl" x="630" y="456" text-anchor="middle">Evidence S3</text>
  <text class="sub" x="630" y="472" text-anchor="middle">Object Lock (WORM)</text>

  <rect class="box" x="760" y="430" width="170" height="64" rx="8" fill="#879596"/>
  <text class="lbl" x="845" y="456" text-anchor="middle">Target AWS resources</text>
  <text class="sub" x="845" y="472" text-anchor="middle">S3 / IAM / …</text>

  <!-- Edges -->
  <line class="edge" x1="200" y1="108" x2="278" y2="108"/>
  <text class="etxt" x="212" y="100">REST</text>

  <path class="edged" d="M450,96 C490,96 490,108 528,108"/>
  <text class="etxt" x="455" y="90">invoke</text>

  <path class="edge" d="M700,108 L758,108"/>
  <text class="etxt" x="708" y="100">trigger</text>

  <line class="edge" x1="615" y1="136" x2="615" y2="176"/>
  <line class="edge" x1="845" y1="136" x2="845" y2="176"/>

  <path class="edge" d="M365,136 L365,198"/>
  <text class="etxt" x="370" y="160">enqueue decision</text>

  <path class="edge" d="M365,250 L365,288"/>
  <text class="etxt" x="370" y="272">after N retries</text>

  <path class="edge" d="M450,225 C490,225 490,300 528,300"/>
  <text class="etxt" x="455" y="248">poll (batch)</text>

  <line class="edge" x1="700" y1="300" x2="758" y2="300"/>

  <path class="edge" d="M845,338 L845,360 L845,428"/>
  <text class="etxt" x="850" y="392">apply change</text>

  <path class="edge" d="M615,330 L615,360 L500,360 L420,428"/>
  <text class="etxt" x="520" y="356">evidence + status</text>

  <path class="edge" d="M615,330 C615,380 630,400 630,428"/>
  <text class="etxt" x="636" y="406">WORM</text>

  <path class="edged" d="M365,136 C365,400 280,420 300,428"/>
  <text class="etxt" x="250" y="300" transform="rotate(-90 250 300)">read/write</text>
</svg>
